name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: rg-safetrip-ai-prod
  AZURE_CONTAINER_APP: ca-safetrip-ai-prod
  IMAGE_NAME: safetrip-ai
  ACR_NAME: acrsafetripaiprod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run Python tests
        run: python -m pytest tests/ -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Azure configuration
        run: |
          az containerapp show \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query name \
            -o tsv

      - name: Resolve ACR login server
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          az acr login --name "$ACR_NAME"
          docker build \
            --tag "$ACR_LOGIN_SERVER/$IMAGE_NAME:$GITHUB_SHA" \
            --tag "$ACR_LOGIN_SERVER/$IMAGE_NAME:main" \
            .
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$GITHUB_SHA"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:main"

      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:$GITHUB_SHA"

      - name: Show deployed URL
        run: |
          FQDN=$(az containerapp show \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          echo "https://$FQDN"
